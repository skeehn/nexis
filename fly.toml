# fly.toml — Nexis single-region MVP deployment
app = "nexis"
primary_region = "sjc"  # San Jose

[build]
  dockerfile = "Dockerfile.production"

[env]
  PORT = "3000"
  RUST_LOG = "info,nexis_core=debug"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 75

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/v1/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024

[deploy]
  release_command = ""
  strategy = "rolling"
