version: '3.8'

services:
  nexis:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - SERPER_API_KEY=${SERPER_API_KEY:-}
      - EXA_API_KEY=${EXA_API_KEY:-}
      - PORT=3000
      - RUST_LOG=${RUST_LOG:-info}
    volumes:
      - nexis-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  nexis-data:
