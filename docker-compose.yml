services:
  # Markify server — REST API + MCP
  markify:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - RUST_LOG=info
      - SERPER_API_KEY=${SERPER_API_KEY:-}
      - BIND=0.0.0.0:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Redis for caching (optional — uncomment to enable)
